quarkus:
  application:
    name: test-module
  grpc:
    server:
      port: 49094  # Different from other modules
      host: 0.0.0.0
      enable-reflection-service: true
      max-inbound-message-size: 1073741824  # 1GB
      max-outbound-message-size: 1073741824  # 1GB
      health:
        enabled: true
    clients:
      testService:
        max-inbound-message-size: 1073741824  # 1GB
  log:
    level: INFO
    category:
      "com.rokkon":
        level: DEBUG
  container-image:
    build: false
    push: false
    registry: "registry.rokkon.com:8443"
    image: "rokkon/test-module:${quarkus.application.version}"
    group: rokkon
    # Use docker builder
    builder: docker

# Module specific configuration
test:
  processor:
    name: test-processor
    delay:
      ms: 0

# Test profile configuration
"%test":
  quarkus:
    grpc:
      server:
        port: 0  # Use random port for tests
        max-inbound-message-size: 1073741824  # 1GB for tests
      clients:
        testService:
          max-inbound-message-size: 1073741824  # 1GB