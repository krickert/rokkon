quarkus:
  application:
    name: engine-consul

  # HTTP configuration
  http:
    port: 38091
    host: 0.0.0.0

  # Swagger UI
  swagger-ui:
    always-include: true
    path: /swagger-ui

  # OpenAPI
  smallrye-openapi:
    path: /openapi
    info-title: Rokkon Pipeline Configuration API
    info-version: 1.0.0
    info-description: REST API for managing pipeline configurations in Consul

  # REST configuration

  # Stork service discovery for Consul
  stork:
    # Pipeline services discovery
    pipeline-service:
      service-discovery:
        type: consul
        consul-host: ${CONSUL_HOST:localhost}
        consul-port: ${CONSUL_PORT:8500}

    # Module services discovery
    module-service:
      service-discovery:
        type: consul
        consul-host: ${CONSUL_HOST:localhost}
        consul-port: ${CONSUL_PORT:8500}

  # Logging
  log:
    level: INFO
    category:
      "com.rokkon":
        level: DEBUG
    console:
      enable: true
      format: "%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n"

  # Index dependencies for reflection
  index-dependency:
    com-rokkon-pipeline-engine-models:
      group-id: com.rokkon.pipeline
      artifact-id: engine-models

# Consul configuration
consul:
  host: ${CONSUL_HOST:localhost}
  port: ${CONSUL_PORT:8500}

# Development profile
"%dev":
  quarkus:
    live-reload:
      instrumentation: true

# Test profile
"%test":
  quarkus:
    log:
      level: DEBUG
