# Disable Kafka dev services for faster test startup
quarkus.devservices.enabled=false
quarkus.kafka.devservices.enabled=false

# Disable other dev services that might slow down tests
quarkus.datasource.devservices.enabled=false
quarkus.elasticsearch.devservices.enabled=false
quarkus.redis.devservices.enabled=false

# Disable auto-registration with Consul for tests
quarkus.consul.enabled=false

# Test-specific logging
quarkus.log.level=INFO
quarkus.log.category."com.rokkon.modules.tika".level=DEBUG
quarkus.log.category."io.quarkus.grpc".level=DEBUG

# gRPC client configuration for tests
quarkus.grpc.clients.tika.host=localhost
quarkus.grpc.clients.tika.port=9002

# Tika module configuration overrides for testing
tika.max-content-length=10000000
tika.enable-geo-topic-parser=false
tika.extract-embedded-docs=true
tika.parse-timeout-seconds=60
tika.max-recursion-depth=10
tika.enable-ocr=false
tika.ocr-strategy=OCR_ONLY
tika.ocr-language=eng
tika.ocr-timeout-seconds=120
tika.enable-x-tika-content=false
tika.flatten-compound=false
tika.ignore-tika-exception=false
tika.enable-password-extraction=false