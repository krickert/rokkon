quarkus:
  application:
    name: rokkon-engine

  http:
    port: 8081
    host: 0.0.0.0

  grpc:
    server:
      port: 9000
      host: 0.0.0.0
      enable-reflection-service: true
      max-inbound-message-size: 4194304
      health:
        enabled: true

    # gRPC client defaults
    clients:
      default:
        max-inbound-message-size: 4194304
        keepalive-time: 30s
        keepalive-timeout: 10s

  # Consul configuration
  consul-config:
    enabled: false
    agent:
      host-port: ${consul.host:localhost}:${consul.port:8500}
    properties-value-keys: rokkon-clusters/${CLUSTER_NAME:default}/config

  # Index external dependencies for CDI discovery
  index-dependency:
    engine-consul:
      group-id: com.rokkon.pipeline
      artifact-id: engine-consul
    engine-models:
      group-id: com.rokkon.pipeline
      artifact-id: engine-models

  # Health check configuration
  health:
    extensions:
      enabled: true
    readiness:
      enabled: true
    liveness:
      enabled: true

  # Logging
  log:
    level: INFO
    category:
      "com.rokkon":
        level: DEBUG
      "io.grpc":
        level: INFO

# Engine-specific configuration
consul:
  host: ${CONSUL_HOST:localhost}
  port: ${CONSUL_PORT:8500}

# Stork configuration for service discovery
stork:
  # Default service discovery for all services
  default:
    service-discovery:
      type: consul
      consul-host: ${consul.host:localhost}
      consul-port: ${consul.port:8500}
      refresh-period: 10s
    load-balancer:
      type: round-robin

  # Module-specific configurations
  echo-service:
    service-discovery:
      type: consul
      consul-host: ${consul.host:localhost}
      consul-port: ${consul.port:8500}
    load-balancer:
      type: least-requests

  chunker-service:
    service-discovery:
      type: consul
      consul-host: ${consul.host:localhost}
      consul-port: ${consul.port:8500}
    load-balancer:
      type: least-response-time

  parser-service:
    service-discovery:
      type: consul
      consul-host: ${consul.host:localhost}
      consul-port: ${consul.port:8500}
    load-balancer:
      type: round-robin

  embedder-service:
    service-discovery:
      type: consul
      consul-host: ${consul.host:localhost}
      consul-port: ${consul.port:8500}
    load-balancer:
      type: least-requests

grpc:
  client:
    max-inbound-message-size: ${GRPC_MAX_MESSAGE_SIZE:4194304}
    keepalive-time-seconds: ${GRPC_KEEPALIVE_TIME:30}
    keepalive-timeout-seconds: ${GRPC_KEEPALIVE_TIMEOUT:10}

# Dev profile
"%dev":
  quarkus:
    log:
      level: INFO
      console:
        enable: true
      category:
        "com.rokkon.pipeline":
          level: DEBUG
        "org.testcontainers":
          level: INFO
  # Enable auto-start of Consul container in dev mode
  rokkon:
    dev:
      consul:
        auto-start: true

# Test profile  
"%test":
  quarkus:
    grpc:
      server:
        port: 0  # Random port for tests
    consul-config:
      enabled: false  # Disable in tests unless explicitly needed
    log:
      level: INFO
