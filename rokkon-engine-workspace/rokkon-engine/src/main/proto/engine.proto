syntax = "proto3";

package com.rokkon.engine;

option java_package = "com.rokkon.pipeline.engine.grpc";
option java_outer_classname = "EngineProto";
option java_multiple_files = true;

import "google/protobuf/empty.proto";

service EngineService {
  rpc GetStatus(google.protobuf.Empty) returns (EngineStatus);
}

message EngineStatus {
  string name = 1;
  string version = 2;
  bool ready = 3;
}