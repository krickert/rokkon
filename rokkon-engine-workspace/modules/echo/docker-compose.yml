version: '3.8'

services:
  echo:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    image: rokkon/echo-module:latest
    container_name: rokkon-echo
    ports:
      - "8080:8080"  # HTTP port
      - "9090:9090"  # gRPC port
    environment:
      - QUARKUS_LOG_LEVEL=INFO
      - QUARKUS_GRPC_SERVER_PORT=9090
      - QUARKUS_GRPC_SERVER_HOST=0.0.0.0
    networks:
      - rokkon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  rokkon-network:
    driver: bridge