quarkus:
  application:
    name: tika-parser-test
  
  grpc:
    server:
      port: 9001  # Change to match client default
      enable-health-service: true
      enable-reflection-service: true
    clients:
      pipe-step-processor:
        host: localhost
        port: 9001
        plain-text: true
  
  # Override any default gRPC client configuration
  log:
    category:
      "io.quarkus.grpc":
        level: TRACE
  
  # Disable auto-registration with Consul for tests
  consul:
    enabled: false
  
  log:
    category:
      "com.rokkon.modules.tika":
        level: DEBUG
      "io.quarkus.grpc":
        level: DEBUG
    console:
      format: "%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n"
      
# Tika-specific configuration for testing
tika:
  parser:
    test-data-buffer:
      enabled: false
      precision: 3

# Tika module configuration overrides for testing
max-content-length: 10000000
enable-geo-topic-parser: false
extract-embedded-docs: true
parse-timeout-seconds: 60
max-recursion-depth: 10
enable-ocr: false
ocr-strategy: "OCR_ONLY"
ocr-language: "eng"
ocr-timeout-seconds: 120
enable-x-tika-content: false
flatten-compound: false
ignore-tika-exception: false
enable-password-extraction: false